name: simplify_me
description: SimplifyMe - Organização pessoal, gestão do tempo e bem-estar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  image_picker: ^1.0.7
  just_audio: ^0.10.5
  intl: ^0.20.2
  path_provider: ^2.1.5
  uuid: ^4.3.3
  record: ^7.0.0
  cupertino_timer: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/